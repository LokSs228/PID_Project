services:
  - type: web
    name: pid-backend
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FLASK_DEBUG
        value: "0"
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
